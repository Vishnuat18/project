<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archives of Love ✦ Maheswari</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=EB+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0818;
            --door: #1a0f35;
            --lav: #c8b4e8;
            --gold: #d4af37;
            --vio: #9b72cf;
            --shim: #f5f0ff;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(155, 114, 207, 0.15);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--shim); font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; }
        body.locked { overflow: hidden; height: 100vh; }

        /* Background Stars */
        #sc { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* DOOR LAYER (Realistic 3D) */
        #door-layer { position: fixed; inset: 0; z-index: 5000; display: flex; perspective: 2000px; transition: visibility 0s 1.2s; cursor: pointer; }
        .door-panel { width: 50%; height: 100%; background: #1a0f35; position: relative; display: flex; align-items: center; justify-content: center; transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(155,114,207,0.3); transform-style: preserve-3d; }
        
        .door-left { border-right: 4px solid var(--gold); transform-origin: left center; background: linear-gradient(90deg, #1a0f35, #25164d); }
        .door-right { border-left: 4px solid var(--gold); transform-origin: right center; background: linear-gradient(-90deg, #1a0f35, #25164d); }
        
        /* Realistic panel details */
        .door-surface { position: absolute; inset: 20px; border: 2px solid rgba(212, 175, 55, 0.2); pointer-events: none; }
        .door-surface::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(212, 175, 55, 0.1); }

        .door-panel::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.6); opacity: 0; transition: opacity 1.5s; pointer-events: none; }
        
        .door-handle { width: 70px; height: 70px; border: 3px solid var(--gold); border-radius: 50%; position: absolute; top: 50%; right: -35px; transform: translateY(-50%) translateZ(40px); background: #25164d; z-index: 10; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); }
        .door-right .door-handle { right: auto; left: -35px; }
        .door-handle::after { content: '✥'; color: var(--gold); font-size: 1.8rem; text-shadow: 0 0 10px var(--gold); }
        
        .door-label { position: absolute; font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.5em; text-transform: uppercase; color: var(--gold); opacity: 0.8; transform: translateZ(20px); text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
        .door-left .door-label { right: 80px; }
        .door-right .door-label { left: 80px; }

        #door-layer.open .door-left { transform: rotateY(-110deg) translateZ(-50px); }
        #door-layer.open .door-right { transform: rotateY(110deg) translateZ(-50px); }
        #door-layer.open .door-panel::after { opacity: 1; }
        #door-layer.open { visibility: hidden; }

        /* LOCK LAYER */
        #lock-layer { position: fixed; inset: 0; z-index: 900; background: rgba(13, 8, 24, 0.95); backdrop-filter: blur(15px); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 1; transition: opacity 0.8s ease; }
        #lock-layer.hidden { opacity: 0; pointer-events: none; }
        .lock-container { width: 320px; text-align: center; }
        .lock-title { font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 0.4em; color: var(--vio); margin-bottom: 2.5rem; text-transform: uppercase; }
        .pass-display { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 3rem; }
        .dot { width: 14px; height: 14px; border: 2px solid var(--vio); border-radius: 50%; transition: all 0.3s; }
        .dot.active { background: var(--lav); box-shadow: 0 0 15px var(--lav); transform: scale(1.2); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; width: 100%; max-width: 260px; margin: 0 auto; }
        .key { aspect-ratio: 1; border: 1px solid rgba(155, 114, 207, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; transition: all 0.3s; font-family: 'Inter', sans-serif; background: rgba(255,255,255,0.02); }
        .key:hover { background: rgba(155, 114, 207, 0.15); border-color: var(--vio); color: var(--lav); }
        .key:active { transform: scale(0.9); }
        .key.clear { grid-column: 1; border: none; font-size: 0.8rem; color: var(--vio); }
        .key.del { grid-column: 3; border: none; font-size: 0.8rem; color: var(--vio); }
        #lock-err { color: #ff5e5e; font-size: 0.75rem; margin-top: 1.5rem; opacity: 0; transition: 0.3s; font-family: 'Inter', sans-serif; }
        #lock-err.visible { opacity: 1; }

        /* MESSAGE LAYER */
        #msg-layer { position: fixed; inset: 0; z-index: 800; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }
        #msg-layer.active { opacity: 1; pointer-events: auto; }
        .welcome-text { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-style: italic; font-weight: 300; line-height: 1.4; text-align: center; color: var(--lav); opacity: 0; transform: translateY(20px); transition: all 1.5s ease; width: 80%; }
        .welcome-text.show { opacity: 1; transform: translateY(0); }
        .hint-text { margin-top: 2rem; font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--vio); opacity: 0; transition: opacity 1s 1s; }
        .hint-text.show { opacity: 0.5; }

        /* DASHBOARD LAYER */
        /* DASHBOARD LAYER (Native Scroll) */
        #dashboard { position: relative; z-index: 100; opacity: 0; display: none; padding: 4rem 1.5rem; transition: opacity 1.5s ease; }
        #dashboard.active { opacity: 1; display: block; }
        .header { text-align: center; margin-bottom: 5rem; }
        .header-title { font-family: 'Cinzel', serif; font-size: 1.5rem; letter-spacing: 0.6em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
        .header-sub { font-family: 'EB Garamond', serif; font-size: 0.9rem; font-style: italic; color: var(--vio); letter-spacing: 0.2em; opacity: 0.7; }

        .vault-section { max-width: 900px; margin: 0 auto 6rem; }
        .section-title { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--vio); border-bottom: 1px solid var(--border); padding-bottom: 0.8rem; margin-bottom: 3rem; display: flex; align-items: center; gap: 1rem; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }

        .answers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; backdrop-filter: blur(10px); transition: all 0.4s; position: relative; overflow: hidden; }
        .card:hover { border-color: rgba(155, 114, 207, 0.45); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(to right, transparent, var(--vio), transparent); opacity: 0.3; }
        
        .card-q { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--vio); margin-bottom: 1rem; display: block; }
        .card-a { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-style: italic; color: #fff; line-height: 1.2; word-wrap: break-word; }

        /* FEEDBACK CARD */
        .feedback-container { background: var(--glass); border: 1px solid var(--border); border-radius: 25px; padding: 3rem; position: relative; }
        .stars-row { display: flex; gap: 0.5rem; margin-bottom: 2rem; color: var(--gold); font-size: 1.2rem; }
        .fb-group { margin-bottom: 2rem; }
        .fb-label { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.3em; color: var(--vio); margin-bottom: 0.6rem; display: block; opacity: 0.8; }
        .fb-content { font-family: 'EB Garamond', serif; font-size: 1.3rem; line-height: 1.5; color: var(--shim); }
        .fb-feeling { font-size: 1.5rem; font-style: italic; line-height: 1.7; color: #fff; background: rgba(155, 114, 207, 0.1); padding: 1.5rem; border-radius: 15px; border-left: 3px solid var(--gold); }

        /* AI VOICE CONTROLS */
        .voice-fab { position: fixed; bottom: 2.5rem; right: 2.5rem; width: 65px; height: 65px; border-radius: 50%; background: var(--door); border: 1px solid var(--vio); color: var(--lav); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; cursor: pointer; z-index: 500; box-shadow: 0 0 30px rgba(155, 114, 207, 0.4); transition: all 0.4s; overflow: hidden; }
        .voice-fab:hover { transform: scale(1.1); box-shadow: 0 0 50px rgba(155, 114, 207, 0.6); }
        .voice-fab.speaking { border-color: var(--gold); background: #261550; animation: pulseSpeak 1.5s infinite; }
        
        @keyframes pulseSpeak {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
            50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.7); }
        }

        .waves-container { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 3px; opacity: 0; transition: 0.3s; }
        .voice-fab.speaking .waves-container { opacity: 1; }
        .voice-fab.speaking .mic-icon { opacity: 0; }
        .bar { width: 3px; height: 10px; background: var(--gold); border-radius: 3px; animation: vibrate 0.5s infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.1s; height: 18px; }
        .bar:nth-child(3) { animation-delay: 0.2s; height: 25px; }
        .bar:nth-child(4) { animation-delay: 0.3s; height: 15px; }

        @keyframes vibrate {
            from { transform: scaleY(1); }
            to { transform: scaleY(1.8); }
        }

        .ai-overlay { position: fixed; top: 2rem; left: 50%; transform: translateX(-50%); background: rgba(26, 15, 53, 0.9); padding: 0.8rem 2rem; border-radius: 50px; border: 1px solid var(--vio); font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.3em; color: var(--gold); z-index: 1000; opacity: 0; pointer-events: none; transition: 0.5s; display: flex; align-items: center; gap: 1rem; }
        .ai-overlay.active { opacity: 1; top: 3rem; }
        .dot-pulse { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: pulseDots 1s infinite alternate; }

        @keyframes pulseDots {
            from { opacity: 0.3; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.2); }
        }

        @media (max-width: 768px) {
            .door-label { display: none; }
            .welcome-text { font-size: 1.6rem; }
            .header-title { letter-spacing: 0.4em; }
            .dashboard-layer { padding: 3rem 1rem; }
            .card { padding: 1.5rem; }
            .fb-content { font-size: 1.1rem; }
            .fb-feeling { font-size: 1.2rem; }
            .voice-fab { bottom: 1.5rem; right: 1.5rem; width: 55px; height: 55px; }
        }
        
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body class="locked">

    <canvas id="sc"></canvas>

    <!-- STEP 1: DOORS -->
    <div id="door-layer" onclick="openDoors()">
        <div class="door-panel door-left">
            <div class="door-surface"></div>
            <span class="door-label">M.A.H.E.S.W.A.R.I</span>
            <div class="door-handle"></div>
        </div>
        <div class="door-panel door-right">
            <div class="door-surface"></div>
            <span class="door-label">The Archives</span>
            <div class="door-handle"></div>
        </div>
    </div>

    <!-- STEP 2: LOCK -->
    <div id="lock-layer" class="hidden">
        <div class="lock-container">
            <h1 class="lock-title">Vault Access</h1>
            <div class="pass-display" id="pass-display">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="keypad">
                <div class="key" onclick="dial('1')">1</div><div class="key" onclick="dial('2')">2</div><div class="key" onclick="dial('3')">3</div>
                <div class="key" onclick="dial('4')">4</div><div class="key" onclick="dial('5')">5</div><div class="key" onclick="dial('6')">6</div>
                <div class="key" onclick="dial('7')">7</div><div class="key" onclick="dial('8')">8</div><div class="key" onclick="dial('9')">9</div>
                <div class="key clear" onclick="dial('clear')">CLEAR</div><div class="key" onclick="dial('0')">0</div><div class="key del" onclick="dial('del')">BACK</div>
            </div>
            <div id="lock-err">Invalid Passcode Entry</div>
        </div>
    </div>

    <!-- STEP 3: MESSAGE -->
    <div id="msg-layer">
        <p class="welcome-text" id="welcome-text">Loading the echoes of a heart ✧</p>
        <span class="hint-text" id="hint-text">Opening the Vault ❂</span>
    </div>

    <!-- STEP 4: DASHBOARD -->
    <div id="dashboard">
        <header class="header">
            <h1 class="header-title">The Sealed Hearts</h1>
            <p class="header-sub">✦ Captured Answers & Feedback ✦</p>
        </header>

        <section class="vault-section">
            <h2 class="section-title">Her Answers ✦</h2>
            <div class="answers-grid" id="ans-grid">
                <!-- JS Populated -->
            </div>
        </section>

        <section class="vault-section">
            <h2 class="section-title">Her Voice ✦</h2>
            <div id="feedback-root">
                <!-- JS Populated -->
            </div>
        </section>
    </div>

    <!-- AI OVERLAY -->
    <div class="ai-overlay" id="ai-status">
        <div class="dot-pulse"></div>
        <span>AI Reading Archives</span>
    </div>

    <!-- VOICE FAB -->
    <button class="voice-fab" id="voice-fab" onclick="toggleVoiceRead()">
        <span class="mic-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        </span>
        <div class="waves-container">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </button>

    <script>
        // STARS CANVAS
        const canvas = document.getElementById('sc'), ctx = canvas.getContext('2d');
        let stars = [];
        function rc() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function is() { stars = []; for (let i = 0; i < 180; i++) stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.2 + 0.2, speed: Math.random() * 0.002 + 0.001, t: Math.random() * Math.PI * 2 }); }
        function ds() { ctx.clearRect(0,0,canvas.width, canvas.height); stars.forEach(s => { s.t += s.speed; const a = 0.2 + 0.5 * Math.abs(Math.sin(s.t)); ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fillStyle = `rgba(200,180,232,${a})`; ctx.fill(); }); requestAnimationFrame(ds); }
        rc(); is(); ds(); window.addEventListener('resize', () => { rc(); is(); });

        // SEQUENCE LOGIC
        function openDoors() {
            document.getElementById('door-layer').classList.add('open');
            setTimeout(() => {
                document.getElementById('lock-layer').classList.remove('hidden');
            }, 1000);
        }

        let currentPass = '';
        const correctPass = '1204';
        function dial(v) {
            const dots = document.querySelectorAll('.dot');
            if (v === 'clear') currentPass = '';
            else if (v === 'del') currentPass = currentPass.slice(0,-1);
            else if (currentPass.length < 4) currentPass += v;

            dots.forEach((d, i) => d.classList.toggle('active', i < currentPass.length));

            if (currentPass.length === 4) {
                if (currentPass === correctPass) {
                    unlockVault();
                } else {
                    document.getElementById('pass-display').classList.add('shake');
                    document.getElementById('lock-err').classList.add('visible');
                    setTimeout(() => {
                        currentPass = '';
                        dots.forEach(d => d.classList.remove('active'));
                        document.getElementById('pass-display').classList.remove('shake');
                        document.getElementById('lock-err').classList.remove('visible');
                    }, 800);
                }
            }
        }

        // Keyboard support for vault
        window.addEventListener('keydown', e => {
            if (document.getElementById('lock-layer').classList.contains('hidden')) return;
            if (e.key >= '0' && e.key <= '9') dial(e.key);
            if (e.key === 'Backspace') dial('clear');
            if (e.key === 'Enter') { /* verify is automatic at 4 chars */ }
        });

        function unlockVault() {
            document.getElementById('lock-layer').classList.add('hidden');
            const msgLayer = document.getElementById('msg-layer');
            msgLayer.classList.add('active');
            
            const txt = document.getElementById('welcome-text');
            const hint = document.getElementById('hint-text');
            
            setTimeout(() => { txt.classList.add('show'); }, 500);
            setTimeout(() => { txt.textContent = "Welcome to the Archives of our Hearts, Maheswari."; }, 2500);
            setTimeout(() => { hint.classList.add('show'); }, 3500);
            
            setTimeout(() => {
                msgLayer.style.opacity = '0';
                document.body.classList.remove('locked');
                const dash = document.getElementById('dashboard');
                dash.style.display = 'block';
                setTimeout(() => dash.classList.add('active'), 50);
                loadData();
                setTimeout(() => msgLayer.remove(), 2000);
            }, 6000);
        }

        // DATA LOADING
        const QLABELS = [
          'Favourite feature — more than eyes', 'Want a hug?', 'Feeling when he held your hand',
          'Favourite nickname', 'Favourite gift from him', 'What she wants from him',
          'The reason for our silence ❦', 'Favourite love language', 
          'Did she really love him?', 'Feeling after reading this story'
        ];

        function loadData() {
            const answers = JSON.parse(localStorage.getItem('mahiAnswers') || '{}');
            const feedback = JSON.parse(localStorage.getItem('mahiFeedback') || '{}');
            
            const grid = document.getElementById('ans-grid');
            grid.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const a = answers['Q' + i] || 'Not answered yet';
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<span class="card-q">Q${i} · ${QLABELS[i-1]}</span><div class="card-a">${a}</div>`;
                grid.appendChild(card);
            }

            const fbRoot = document.getElementById('feedback-root');
            if (feedback.timestamp) {
                let starsHtml = '';
                for(let i=0; i<5; i++) starsHtml += (i < feedback.rating) ? '★' : '☆';
                
                fbRoot.innerHTML = `
                    <div class="feedback-container">
                        <div class="stars-row">${starsHtml}</div>
                        <div class="fb-group">
                            <span class="fb-label">Favourite Gift</span>
                            <div class="fb-content">${feedback.gift || 'No thoughts'}</div>
                        </div>
                        <div class="fb-group">
                            <span class="fb-label">Design Feedback</span>
                            <div class="fb-content">${feedback.design || 'No thoughts'}</div>
                        </div>
                        <div class="fb-group">
                            <span class="fb-label">Final Feelings</span>
                            <div class="fb-feeling">${feedback.feeling || 'No feeling stored.'}</div>
                        </div>
                        <div class="fb-label" style="text-align:right; margin-top:2rem">Recorded on: ${new Date(feedback.timestamp).toLocaleString()}</div>
                    </div>
                `;
            } else {
                fbRoot.innerHTML = '<div class="card" style="text-align:center; opacity:0.5">No feedback records found yet.</div>';
            }
        }

        // AI VOICE MODE
        let synth = window.speechSynthesis;
        let isSpeaking = false;

        function toggleVoiceRead() {
            if (isSpeaking) {
                synth.cancel();
                stopSpeaking();
                return;
            }
            startSpeaking();
        }

        function startSpeaking() {
            isSpeaking = true;
            document.getElementById('voice-fab').classList.add('speaking');
            document.getElementById('ai-status').classList.add('active');

            const answers = JSON.parse(localStorage.getItem('mahiAnswers') || '{}');
            const fb = JSON.parse(localStorage.getItem('mahiFeedback') || '{}');

            let textToRead = "Archiving initiated. Reading her heart's records. ";
            
            for(let i=1; i<=10; i++) {
                if(answers['Q'+i]) {
                    textToRead += `Question ${i}: ${QLABELS[i-1]}. Her answer was: ${answers['Q'+i]}. `;
                }
            }

            if(fb.feeling) {
                textToRead += "Regarding her overall feelings, she expressed: " + fb.feeling;
            } else {
                textToRead += "No feedback was recorded in the archives yet.";
            }

            const utter = new SpeechSynthesisUtterance(textToRead);
            utter.rate = 0.9;
            utter.pitch = 1.1;
            
            // Try to find a nice female voice
            const voices = synth.getVoices();
            const preferred = voices.find(v => v.name.includes('Google UK English Female') || v.name.includes('Female') || v.lang === 'en-GB');
            if(preferred) utter.voice = preferred;

            utter.onend = stopSpeaking;
            synth.speak(utter);
        }

        function stopSpeaking() {
            isSpeaking = false;
            document.getElementById('voice-fab').classList.remove('speaking');
            document.getElementById('ai-status').classList.remove('active');
        }

        // Initialize voices for chrome
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
